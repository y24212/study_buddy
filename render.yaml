services:
  - type: web
    name: study-buddy
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: study-buddy-db
    databaseName: study_buddy
    user: study_buddy_user
    plan: free