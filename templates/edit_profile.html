{% extends 'base.html' %}

{% block content %}
<h2 class="text-primary">编辑个人资料</h2>

<div class="card">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group mb-4">
                <label>头像</label>
                <div class="d-flex align-items-center">
                    <img
                        src="{{ url_for('static', filename='uploads/' + current_user.avatar) if current_user.avatar and current_user.avatar != 'default.jpg' else url_for('static', filename='assets/default-avatar.png') }}"
                        class="rounded-circle"
                        width="80"
                        height="80"
                        alt="头像"
                    >
                    <input type="file" name="avatar" class="form-control ml-4" accept="image/*">
                </div>
            </div>

            <div class="form-group mb-4">
                <label>昵称</label>
                <input type="text" name="nickname" class="form-control"
                       value="{{ current_user.nickname }}" required>
            </div>

            <div class="form-group mb-4">
                <label>个性签名（仅限学习相关）</label>
                <textarea name="bio" class="form-control" rows="3" maxlength="200">{{ current_user.bio or '' }}</textarea>
            </div>

            <div class="form-group mb-4">
                <label>搭子邀请码</label>
                <input type="text" class="form-control"
                       value="{{ current_user.invite_code }}" readonly>
            </div>

            <button type="submit" class="btn btn-primary">保存修改</button>
            <a href="{{ url_for('profile') }}" class="btn btn-secondary ml-2">取消</a>
        </form>
    </div>
</div>
{% endblock %}
