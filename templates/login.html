<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 学习搭子系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            min-height: 100vh;
        }
        .login-card {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center p-4">
    <div class="card login-card w-100 max-w-md">
        <div class="card-body p-6">
            <div class="text-center mb-6">
                <h2 class="text-primary">📚 学习搭子</h2>
                <p class="text-muted">专注学习，自律成长</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-4">
                    <label class="form-label">用户名/邀请码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" name="identifier" class="form-control" placeholder="请输入用户名或8位邀请码" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">登 录</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted">还没有账号？</p>
                <a href="{{ url_for('register') }}" class="text-primary">立即注册</a>
            </div>
        </div>
    </div>
</body>
</html>
