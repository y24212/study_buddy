{% extends 'base.html' %}

{% block content %}
<h2 class="text-primary">数据统计</h2>

<!-- 隐藏的数据存储 -->
<div id="data-container" style="display: none;"
     data-task-stats="{{ task_stats | tojson | safe }}"
     data-focus-stats="{{ focus_stats | tojson | safe }}"
     data-category-stats="{{ category_stats | tojson | safe }}"
     data-heatmap-data="{{ heatmap_data | tojson | safe }}">
</div>

<!-- 任务完成率 -->
<div class="card mb-4">
    <div class="card-header">
        <h4>📊 任务完成率（近7天）</h4>
    </div>
    <div class="card-body">
        <div id="task-chart" class="chart-container"></div>
    </div>
</div>

<!-- 专注时长 -->
<div class="card mb-4">
    <div class="card-header">
        <h4>⏱️ 专注时长（近7天）</h4>
    </div>
    <div class="card-body">
        <div id="focus-chart" class="chart-container"></div>
    </div>
</div>

<!-- 分类占比 -->
<div class="card mb-4">
    <div class="card-header">
        <h4>📈 各分类任务专注时长占比</h4>
    </div>
    <div class="card-body">
        <div id="category-chart" class="chart-container"></div>
    </div>
</div>

<!-- 时段热力图 -->
<div class="card">
    <div class="card-header">
        <h4>🔥 专注时段分布</h4>
    </div>
    <div class="card-body">
        <div id="heatmap-chart" class="chart-container"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
// 从隐藏元素获取数据
document.addEventListener('DOMContentLoaded', function() {
    var dataContainer = document.getElementById('data-container');
    
    // 解析JSON数据
    var taskStatsData = JSON.parse(dataContainer.getAttribute('data-task-stats'));
    var focusStatsData = JSON.parse(dataContainer.getAttribute('data-focus-stats'));
    var categoryStatsData = JSON.parse(dataContainer.getAttribute('data-category-stats'));
    var heatmapData = JSON.parse(dataContainer.getAttribute('data-heatmap-data'));

    // 任务完成率图表
    var taskChart = echarts.init(document.getElementById('task-chart'));
    taskChart.setOption({
        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                return params[0].axisValue + '<br/>完成率: ' + params[0].value + '%';
            }
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: taskStatsData.map(function(item) { return item.date; }),
            axisLabel: { color: '#6c757d' }
        },
        yAxis: {
            type: 'value',
            max: 100,
            axisLabel: { color: '#6c757d', formatter: '{value}%' },
            splitLine: { lineStyle: { color: '#e9ecef' } }
        },
        series: [{
            type: 'line',
            smooth: true,
            data: taskStatsData.map(function(item) { return item.rate; }),
            lineStyle: { color: '#4ecdc4', width: 3 },
            areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    {offset: 0, color: 'rgba(78, 205, 196, 0.4)'},
                    {offset: 1, color: 'rgba(78, 205, 196, 0.05)'}
                ])
            }
        }]
    });

    // 专注时长图表
    var focusChart = echarts.init(document.getElementById('focus-chart'));
    focusChart.setOption({
        tooltip: {
            trigger: 'axis',
            formatter: function(params) {
                return params[0].axisValue + '<br/>专注时长: ' + params[0].value + '分钟';
            }
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: focusStatsData.map(function(item) { return item.date; }),
            axisLabel: { color: '#6c757d' }
        },
        yAxis: {
            type: 'value',
            name: '分钟',
            nameTextStyle: { color: '#6c757d' },
            axisLabel: { color: '#6c757d' },
            splitLine: { lineStyle: { color: '#e9ecef' } }
        },
        series: [{
            type: 'bar',
            data: focusStatsData.map(function(item) { return item.duration; }),
            itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    {offset: 0, color: '#4ecdc4'},
                    {offset: 1, color: '#3dbeb5'}
                ]),
                borderRadius: [4, 4, 0, 0]
            }
        }]
    });

    // 分类占比饼图
    var categoryChart = echarts.init(document.getElementById('category-chart'));
    categoryChart.setOption({
        tooltip: {
            trigger: 'item',
            formatter: '{b}: {c}分钟 ({d}%)'
        },
        legend: {
            orient: 'horizontal',
            bottom: 10,
            textStyle: { color: '#6c757d' }
        },
        series: [{
            type: 'pie',
            radius: ['45%', '70%'],
            center: ['50%', '45%'],
            itemStyle: {
                borderRadius: 8,
                borderColor: '#fff',
                borderWidth: 2
            },
            label: { show: true, formatter: '{b}: {c}分钟' },
            data: categoryStatsData
        }]
    });

    // 时段热力图
    var heatmapChart = echarts.init(document.getElementById('heatmap-chart'));
    heatmapChart.setOption({
        tooltip: {
            position: 'top',
            formatter: function(params) {
                var days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                return days[params.data[0]] + ' ' + params.data[1] + ':00<br/>专注次数: ' + params.data[2];
            }
        },
        grid: { top: 60, bottom: 80, left: 80, right: 40 },
        xAxis: {
            type: 'category',
            data: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
            axisLabel: { color: '#6c757d' },
            splitArea: { show: true }
        },
        yAxis: {
            type: 'category',
            data: ['00:00', '01:00', '02:00', '03:00', '04:00', '05:00', '06:00', '07:00', '08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00', '21:00', '22:00', '23:00'],
            axisLabel: { color: '#6c757d', interval: 2 },
            splitArea: { show: true }
        },
        visualMap: {
            min: 0,
            max: 5,
            calculable: true,
            orient: 'horizontal',
            left: 'center',
            bottom: '10px',
            color: ['#4ecdc4', '#7ed6cf', '#ace5df', '#d7f2ef', '#f8f9fa']
        },
        series: [{
            type: 'heatmap',
            data: heatmapData,
            label: { show: true, fontSize: 10 },
            emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(78, 205, 196, 0.5)' } }
        }]
    });

    // 响应式调整
    window.addEventListener('resize', function() {
        taskChart.resize();
        focusChart.resize();
        categoryChart.resize();
        heatmapChart.resize();
    });
});
</script>

<style>
.chart-container {
    height: 300px;
    width: 100%;
}
</style>
{% endblock %}
